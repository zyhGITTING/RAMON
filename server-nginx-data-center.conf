# Put these locations inside the existing server {} block on the host nginx.
# Replace /opt/datamid/frontend with the real frontend directory.

location = /data_center {
    return 301 /data_center/;
}

location = /data_center/ {
    root /opt/datamid/frontend;
    try_files /index.html =404;

    sub_filter "window.__DATAMID_BASE_PATH__ = '__DATAMID_BASE_PATH__'" "window.__DATAMID_BASE_PATH__ = '/data_center'";
    sub_filter_once off;
}

location ^~ /data_center/api/ {
    proxy_pass http://127.0.0.1:8128/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /data_center;

    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

location ^~ /data_center/ {
    rewrite ^/data_center/(.*)$ /$1 break;
    root /opt/datamid/frontend;
    index index.html;
    try_files $uri $uri/ @datamid_index;

    sub_filter "window.__DATAMID_BASE_PATH__ = '__DATAMID_BASE_PATH__'" "window.__DATAMID_BASE_PATH__ = '/data_center'";
    sub_filter_once off;
}

location @datamid_index {
    root /opt/datamid/frontend;
    try_files /index.html =404;

    sub_filter "window.__DATAMID_BASE_PATH__ = '__DATAMID_BASE_PATH__'" "window.__DATAMID_BASE_PATH__ = '/data_center'";
    sub_filter_once off;
}
